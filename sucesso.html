<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pagamento Confirmado — Carta do Coração</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(160deg, #fdf0f6 0%, #fce4ec 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .box {
      background: #fff; border-radius: 24px; padding: 3rem 2rem;
      text-align: center; max-width: 400px; width: 100%;
      box-shadow: 0 8px 40px rgba(233,30,140,0.12);
      border: 1px solid #f8bbd0;
    }
    .icon { font-size: 64px; margin-bottom: 1rem; }
    h1 { font-size: 24px; font-weight: 900; color: #880e4f; margin-bottom: 0.5rem; }
    p { font-size: 15px; color: #9c4070; line-height: 1.6; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block; background: #e91e8c; color: #fff;
      font-size: 15px; font-weight: 700; padding: 14px 32px;
      border-radius: 50px; text-decoration: none;
      box-shadow: 0 6px 24px rgba(233,30,140,0.3);
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🎉</div>
    <h1>Pagamento confirmado!</h1>
    <p>Sua Carta do Coração está sendo preparada com muito amor. Em instantes você receberá o acesso no email informado.</p>
    <a href="/" class="btn">Criar minha cartinha 💌</a>
  </div>
</body>
</html>
