[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS, GET"
    Access-Control-Allow-Headers = "Content-Type"

[[redirects]]
  from = "/api/pix"
  to = "/.netlify/functions/pix"
  status = 200
  force = true
